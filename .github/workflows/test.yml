name: Test workflow
on: push
jobs:
  Testjob:
    runs-on: ubuntu-latest
    steps:
      - name: Get the code
        uses: actions/checkout@v6
      - name: Setup the Node jobs
        uses: actions/setup-node@v6
        with:
          node-version: 18
      - name: Install the dependencies
        run: npm ci
      - name: Test the code
        run: npm test
      